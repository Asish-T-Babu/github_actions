services:
  db:
    image: postgres:17
    container_name: postgres_db

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: fastapi_app

    depends_on:
      - db

    environment:
      DATABASE_URL: ${DATABASE_URL}

    ports:
      - "8000:8000"

volumes:
  postgres_data: